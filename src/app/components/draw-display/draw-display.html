<div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-200 text-center relative overflow-hidden flex flex-col justify-between min-h-[550px]">
  <!-- Draw area -->
  <div class="flex-1 flex flex-col items-center justify-center">
    @if (ballPhase() === 'shaking' || ballPhase() === 'opening') {
      <!-- Pokéball animation -->
      <div class="pokeball-wrapper" [class.opening]="ballPhase() === 'opening'">
        <div class="pokeball" [class.shaking]="ballPhase() === 'shaking'" [class.opening]="ballPhase() === 'opening'">
          <!-- Top half (red) -->
          <div class="ball-top"></div>
          <!-- Bottom half (white) -->
          <div class="ball-bottom"></div>
          <!-- Center band -->
          <div class="ball-band"></div>
          <!-- Center button -->
          <div class="ball-button">
            <div class="ball-button-inner"></div>
          </div>
        </div>
        <!-- Flash effect on open -->
        @if (ballPhase() === 'opening') {
          <div class="ball-flash"></div>
        }
      </div>
      @if (ballPhase() === 'shaking') {
        <p class="font-black text-red-500 uppercase tracking-widest mt-6 animate-pulse text-sm">
          A wild Pokémon appears...
        </p>
      }
    } @else if (ballPhase() === 'done' && lastDrawn()) {
      <div class="text-center animate-in zoom-in duration-500">
        <img [src]="lastDrawn()!.img" class="w-64 h-64 scale-110 drop-shadow-2xl mx-auto" [alt]="lastDrawn()!.name" />
        <h3 class="text-6xl font-black text-slate-800 uppercase italic mt-4">{{ lastDrawn()!.name }}</h3>
      </div>
    } @else {
      <div class="space-y-4">
        <img
          src="assets/pokemon/ultra-ball.png"
          class="w-20 mx-auto opacity-20"
          alt="Ultra Ball"
        />
        <h2 class="text-2xl font-bold text-slate-400 italic">Ready to find a Pokémon?</h2>
      </div>
    }
  </div>

  <!-- Draw button -->
  <div class="mt-8">
    <button
      (click)="onDraw()"
      [disabled]="isDrawing() || !availablePokemon().length"
      class="bg-red-500 hover:bg-red-600 disabled:opacity-50 disabled:cursor-not-allowed text-white text-3xl font-black py-6 px-16 rounded-[2rem] shadow-[0_12px_0_0_#b91c1c] active:shadow-none active:translate-y-2 transition-all w-full md:w-auto"
    >
      @if (!availablePokemon().length) {
        ALL DRAWN! 🎉
      } @else {
        DRAW POKÉMON!
      }
    </button>
  </div>
</div>
