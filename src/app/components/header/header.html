<header class="header-wrap">
  <div class="header-inner">

    <!-- ── Left: Teo logo ── -->
    <div class="teo-logo">
      <img src="assets/teo-logo.png" alt="Teo Logo" class="teo-logo-img" />
    </div>

    <!-- ── Center: Teo's Party title image ── -->
    <div class="title-block">
      <img
        src="assets/teos-party.png"
        alt="Teo's Party"
        class="party-title-img"
      />
    </div>

    <!-- ── Right: action buttons ── -->
    <div class="action-pills">
      <button
        class="action-btn"
        (click)="onToggleFullscreen()"
        [title]="isFullscreen() ? 'Exit fullscreen' : 'Fullscreen (TV mode)'"
      >
        {{ isFullscreen() ? '🗕' : '🖥️' }}
      </button>
      <button
        class="action-btn"
        (click)="onExportPdf()"
        [disabled]="isExporting()"
        [title]="isExporting() ? 'Exporting…' : 'Print bingo cards'"
      >
        {{ isExporting() ? '⏳' : '🖨️' }}
      </button>
      <button
        class="action-btn"
        (click)="onReset()"
        title="Reset game"
      >
        🔄
      </button>
    </div>

  </div>
</header>
