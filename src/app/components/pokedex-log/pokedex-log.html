<div class="card p-6" style="animation-duration: 9s; animation-delay: -3s;">

  <div class="flex items-center gap-3 mb-5">
    <!-- Soft pill label -->
    <div style="background: linear-gradient(135deg, #e53e3e, #c53030); border-radius: 1rem; padding: 6px 18px; box-shadow: 0 4px 12px rgba(150,0,0,0.25);">
      <span class="text-white font-black uppercase tracking-widest text-sm">Pokédex</span>
    </div>
    <div class="flex-1" style="height: 1px; background: linear-gradient(to right, rgba(200,80,80,0.15), transparent);"></div>
    @if (drawnHistory().length) {
      <span class="font-bold text-sm" style="color: rgba(150,60,60,0.5)">
        {{ drawnHistory().length }} / {{ total }} drawn
      </span>
      <!-- Soft progress bar -->
      <div class="w-32 h-2 rounded-full overflow-hidden" style="background: rgba(200,80,80,0.12);">
        <div
          class="h-full rounded-full transition-all duration-700"
          style="background: linear-gradient(to right, #fc8181, #e53e3e);"
          [style.width.%]="(drawnHistory().length / total) * 100">
        </div>
      </div>
    }
  </div>

  @if (!drawnHistory().length) {
    <div class="flex items-center justify-center h-24 font-bold italic text-lg" style="color: rgba(180,80,80,0.3)">
      No Pokémon drawn yet — press Draw to start!
    </div>
  } @else {
    <div class="flex gap-3 overflow-x-auto pb-2" style="-ms-overflow-style:none; scrollbar-width:none;">
      @for (pokemon of drawnHistory(); track pokemon.id; let i = $index) {
        <div
          class="flex-shrink-0 flex flex-col items-center gap-1 rounded-3xl p-3 w-24 transition-all duration-300"
          [class.scale-105]="i === 0"
          [style.background]="i === 0 ? 'rgba(255,220,80,0.18)' : 'rgba(200,80,80,0.06)'"
          [style.box-shadow]="i === 0 ? '0 4px 20px rgba(200,120,0,0.18), inset 0 1px 0 rgba(255,255,255,0.7)' : '0 2px 8px rgba(150,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5)'"
          [style.animation]="i === 0 ? 'tile-pop 0.4s cubic-bezier(0.22,1,0.36,1)' : 'none'"
        >
          <div class="w-10 h-10 rounded-full flex items-center justify-center"
               [style.background]="pokemon.color">
            <img [src]="pokemon.img" [alt]="pokemon.name" class="w-9 h-9 object-contain" />
          </div>
          <span class="text-[10px] font-black uppercase text-center leading-tight w-full truncate"
                [style.color]="i === 0 ? '#92400e' : 'rgba(120,40,40,0.7)'">
            {{ pokemon.name }}
          </span>
          @if (i === 0) {
            <span class="text-[9px] font-black uppercase tracking-wide" style="color: #d97706">✦ Latest</span>
          }
        </div>
      }
    </div>
  }

</div>
