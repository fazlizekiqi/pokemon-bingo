<div class="card p-4" style="display: flex; flex-direction: column; height: 140px; overflow: hidden;">

  <!-- Progress row: shrink-proof, always visible -->
  <div style="flex-shrink: 0; display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;margin-top: 0.5rem">
    @if (drawnHistory().length) {
      <span style="font-weight: 800; font-size: 0.8rem; color: rgba(150,60,60,0.6); white-space: nowrap;">
        {{ drawnHistory().length }} / {{ total }}
      </span>
      <div style="flex: 1; height: 8px; border-radius: 9999px; overflow: hidden; background: rgba(200,80,80,0.12);">
        <div style="height: 100%; border-radius: 9999px; background: linear-gradient(to right, #fc8181, #e53e3e); transition: width 0.5s ease;"
             [style.width.%]="(drawnHistory().length / total) * 100">
        </div>
      </div>
    } @else {
      <span style="font-weight: 700; font-style: italic; font-size: 0.8rem; color: rgba(180,80,80,0.3);">
        No Pokémon drawn yet — press Draw to start!
      </span>
    }
  </div>

  <!-- Tiles wrapper: grows to fill remaining space, tiles absolutely positioned inside -->
  <div style="flex: 1; min-height: 0; position: relative;">
    <div style="position: absolute; inset: 0; display: flex; gap: 0.75rem; overflow-x: auto; overflow-y: hidden;">
      @for (pokemon of drawnHistory(); track pokemon.id; let i = $index) {
        <div style="flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 1.5rem; padding: 8px; width: 76px;"
             [style.background]="i === 0 ? 'rgba(255,220,80,0.18)' : 'rgba(200,80,80,0.06)'"
             [style.box-shadow]="i === 0 ? '0 4px 20px rgba(200,120,0,0.18), inset 0 1px 0 rgba(255,255,255,0.7)' : '0 2px 8px rgba(150,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5)'"
             [style.transform]="i === 0 ? 'scale(1.05)' : 'none'"
             [style.animation]="i === 0 ? 'tile-pop 0.4s cubic-bezier(0.22,1,0.36,1)' : 'none'">
          <div style="width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"
               [style.background]="pokemon.color">
            <img [src]="pokemon.img" [alt]="pokemon.name"
                 style="width: 30px; height: 30px; object-fit: contain; image-rendering: pixelated;" />
          </div>
          <span style="font-size: 9px; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1.1; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                [style.color]="i === 0 ? '#92400e' : 'rgba(120,40,40,0.7)'">
            {{ pokemon.name }}
          </span>
        </div>
      }
    </div>
  </div>

</div>
