<header class="glass border-b-4 border-blue-500 p-4 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="bg-red-500 w-10 h-10 rounded-full border-4 border-white shadow-md flex items-center justify-center text-white font-bold italic">
        T
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight uppercase">
        TEO'S <span class="text-blue-600">BINGO</span>
      </h1>
    </div>
    <!-- Tab nav -->
    <nav class="flex bg-slate-200/50 p-1 rounded-2xl">
      <button
        (click)="switchTab('host')"
        class="tab-btn px-5 py-2 rounded-xl font-bold transition-all text-sm"
        [class.bg-blue-600]="activeTab() === 'host'"
        [class.text-white]="activeTab() === 'host'"
        [class.shadow-md]="activeTab() === 'host'"
        [class.text-slate-600]="activeTab() !== 'host'"
      >
        HOST HUB
      </button>
      <button
        (click)="switchTab('players')"
        class="tab-btn px-5 py-2 rounded-xl font-bold transition-all text-sm"
        [class.bg-blue-600]="activeTab() === 'players'"
        [class.text-white]="activeTab() === 'players'"
        [class.shadow-md]="activeTab() === 'players'"
        [class.text-slate-600]="activeTab() !== 'players'"
      >
        PLAYER BOARDS
      </button>
    </nav>
    <!-- Actions -->
    <div class="flex gap-2">
      <button
        (click)="onExportPdf()"
        [disabled]="isExporting()"
        class="px-5 py-2 rounded-xl font-bold bg-green-600 text-white shadow-lg hover:bg-green-700 disabled:opacity-60 transition-all text-sm flex items-center gap-2"
      >
        <span>{{ isExporting() ? '⏳' : '🖨️' }}</span>
        {{ isExporting() ? 'EXPORTING...' : 'EXPORT A4 CARDS' }}
      </button>
      <button
        (click)="onReset()"
        class="px-4 py-2 rounded-xl font-bold bg-white text-red-500 border border-red-100 hover:bg-red-50 transition text-sm"
      >
        RESET
      </button>
    </div>
  </div>
</header>
